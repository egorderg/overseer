schema: spec-driven

context: |
  Tech stack: TypeScript, React, Tailwind, Node.js, Electron
  Domain: AI first development ide
  Its a ide with support for multiple projects in a workspace like environment. Each project points to a folder.
  The app is controlled via a central config file and the current layout of workspaces and projects is saved also in a central file.

